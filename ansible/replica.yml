- name: Replicación MariaDB entre VMs VirtualBox
  hosts: servidores
  become: no

  vars:
    source: ""
    target: ""

    master_ip: "192.168.49.2"
    master_port: "30306"

    replica_user: "replica"
    replica_password: "replica123"

  tasks:

    #####################################################################
    # VALIDACIÓN
    #####################################################################

    - name: Validar parámetros
      fail:
        msg: "Faltan source o target"
      when:
        - source == ""
        - target == ""

    #####################################################################
    # MASTER
    #####################################################################

    - name: Configurar usuario replicación
      shell: |
        kubectl exec deploy/mariadb -- mariadb -uroot -p1234 -e "
        DROP USER IF EXISTS '{{ replica_user }}'@'%';

        CREATE USER '{{ replica_user }}'@'%'
        IDENTIFIED BY '{{ replica_password }}';

        GRANT REPLICATION SLAVE ON *.* TO '{{ replica_user }}'@'%';

        FLUSH PRIVILEGES;
        "
      when: inventory_hostname == source

    - name: Mostrar usuarios replica
      shell: |
        kubectl exec deploy/mariadb -- mariadb -uroot -p1234 -e "
        SELECT user,host FROM mysql.user WHERE user='{{ replica_user }}';
        "
      register: replica_users
      when: inventory_hostname == source

    - debug:
        var: replica_users.stdout
      when: inventory_hostname == source

    - name: Obtener master status
      shell: |
        kubectl exec deploy/mariadb -- mariadb -uroot -p1234 -e "
        SHOW MASTER STATUS\G
        "
      register: master_status
      when: inventory_hostname == source

    - debug:
        var: master_status.stdout
      when: inventory_hostname == source

    #####################################################################
    # SLAVE
    #####################################################################

    - name: Parar slave
      shell: |
        kubectl exec deploy/mariadb -- mariadb -uroot -p1234 -e "
        STOP SLAVE;
        "
      ignore_errors: true
      when: inventory_hostname == target

    - name: Reset slave completo
      shell: |
        kubectl exec deploy/mariadb -- mariadb -uroot -p1234 -e "
        RESET SLAVE ALL;
        "
      when: inventory_hostname == target

    - name: Configurar replicación
      shell: |
        kubectl exec deploy/mariadb -- mariadb -uroot -p1234 -e "
        CHANGE MASTER TO
          MASTER_HOST='{{ master_ip }}',
          MASTER_PORT={{ master_port }},
          MASTER_USER='{{ replica_user }}',
          MASTER_PASSWORD='{{ replica_password }}',
          MASTER_LOG_FILE='mysql-bin.000001',
          MASTER_LOG_POS=4;
        "
      when: inventory_hostname == target

    - name: Iniciar slave
      shell: |
        kubectl exec deploy/mariadb -- mariadb -uroot -p1234 -e "
        START SLAVE;
        "
      when: inventory_hostname == target

    - name: Esperar replicación
      pause:
        seconds: 5
      when: inventory_hostname == target

    - name: Ver estado slave
      shell: |
        kubectl exec deploy/mariadb -- mariadb -uroot -p1234 -e "
        SHOW SLAVE STATUS\G
        "
      register: slave_status
      when: inventory_hostname == target

    - debug:
        var: slave_status.stdout
      when: inventory_hostname == target

    #####################################################################
    # TEST CONECTIVIDAD
    #####################################################################

    - name: Test conexión replica manual
      shell: |
        kubectl exec deploy/mariadb -- mariadb \
        -h {{ master_ip }} \
        -P {{ master_port }} \
        -u {{ replica_user }} \
        -p{{ replica_password }} \
        -e "SELECT 1;"
      register: replica_test
      ignore_errors: true
      when: inventory_hostname == target

    - debug:
        var: replica_test.stdout
      when: inventory_hostname == target

    - debug:
        var: replica_test.stderr
      when: inventory_hostname == target

    #####################################################################
    # RESULTADO
    #####################################################################

    - name: Resultado final
      debug:
        msg: "Replica {{ source }} -> {{ target }} configurada"
      when: inventory_hostname == target
